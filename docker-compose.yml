# Local infrastructure for order-payment. The app runs on the host via `./gradlew bootRun`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: op-postgres
    environment:
      POSTGRES_DB: orderpayment
      POSTGRES_USER: orderpayment
      POSTGRES_PASSWORD: orderpayment
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderpayment"]
      interval: 5s
      timeout: 3s
      retries: 10
